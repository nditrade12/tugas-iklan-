      }
      createParticles();

      // --- AUTO REFRESH SETIAP 10 DETIK ---
      let refreshTimer;
      function startAutoRefresh() {
        if (refreshTimer) clearTimeout(refreshTimer);

      startAutoRefresh();
      // Reset timer jika ada interaksi pengguna (opsional, agar tidak refresh saat sedang membaca)
      document.addEventListener('click', () => {

      const searchHint = document.getElementById('searchHint');

      function openMenu() {

        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeMenu() {
        slideMenu.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
      }

      hamburgerBtn.addEventListener('click', openMenu);
      slideMenuClose.addEventListener('click', closeMenu);
      overlay.addEventListener('click', closeMenu);

      // --- KONTEN HALAMAN ---
      const pageContent = {

      // Fungsi navigasi
      window.navigateTo = function(page) {
        // Reset active menu
        navLinks.forEach(link => link.classList.remove('active-menu'));
        const activeNav = document.getElementById('nav' + page.charAt(0).toUpperCase() + page.slice(1));
        if (activeNav) activeNav.classList.add('active-menu');

        if (page === 'home') {
          videoGrid.style.display = '';
          loader.style.display = '';
          contentPage.style.display = 'none';
          contentPage.innerHTML = '';
        } else {
          videoGrid.style.display = 'none';
          loader.style.display = 'none';
          contentPage.style.display = 'block';
          contentPage.innerHTML = pageContent[page] || '';
        }

        // Scroll ke atas
        window.scrollTo({ top: 0, behavior: 'smooth' });
        // Tutup menu
        closeMenu();
      };

      // Event listener untuk menu navigasi
      navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const page = this.dataset.page;
          if (page) navigateTo(page);
        });
      });

      // --- GRID VIDEO (1 JUTA CARD) ---
      const TOTAL_CARDS = 1000000;
      const BATCH_SIZE = 24;
      let currentIndex = 0;
      const searchInput = document.getElementById('searchInput');
      const searchClear = document.getElementById('searchClear');
      const renderedCards = [];

      const playSVG = `
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polygon points="6,3 20,12 6,21" />
        </svg>
      `;

      const prefixes = [
        "Eksklusif", "Premium", "Mewah", "Elite", "Signature", "Platinum",
        "Gold", "Diamond", "Crown", "Royal", "Luxury", "Prime", "Grand",
        "Superior", "Deluxe", "Ultimate", "Supreme", "Noble", "Regal", "Imperial"
      ];
      const subjects = [
        "Koleksi", "Sorotan", "Momen", "Karya", "Visual", "Sinema",
        "Dokumenter", "Feature", "Showcase", "Edition", "Experience",
        "Journey", "Story", "Scene", "Capture", "Frame", "Sequence"
      ];
      const suffixes = [
        "Edition", "Series", "Volume", "Chapter", "Part", "Collection",
        "Director's Cut", "Extended", "Limited", "Exclusive"
      ];

      function generateTitle(index) {
        const seed = index;
        const prefix = prefixes[seed % prefixes.length];
        const subject = subjects[Math.floor(seed / 11) % subjects.length];
        const suffix = suffixes[Math.floor(seed / 17) % suffixes.length];
        const number = index + 1;
        const formatType = seed % 4;
        switch (formatType) {
          case 0: return `${prefix} ${subject} #${number}`;
          case 1: return `${subject} ${suffix} • ${prefix}`;
          case 2: return `${prefix} ${suffix}: ${subject}`;
          case 3: return `[${subject}] ${prefix} ${suffix}`;
          default: return `${prefix} ${subject} ${suffix}`;
        }
      }

      function createCard(index) {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.dataset.index = index;
        card.dataset.title = generateTitle(index).toLowerCase();
        const minutes = Math.floor(Math.random() * 20) + 2;
        const seconds = Math.floor(Math.random() * 60).toString().padStart(2, '0');
        card.innerHTML = `
          <div class="play-icon-wrapper">${playSVG}</div>
          <div class="video-title">${generateTitle(index)}</div>
          <div class="video-meta"><span>▶ ${minutes}:${seconds}</span></div>
          <div class="badge">PREMIUM</div>
        `;
        card.addEventListener('click', (e) => { e.preventDefault(); void(0); });
        return card;
      }

      function filterCards(term) {
        const t = term.toLowerCase().trim();
        let count = 0;
        renderedCards.forEach(card => {
          const title = card.dataset.title || '';
          if (t === '') {
            card.classList.remove('hidden-card', 'highlight');
            count++;
          } else if (title.includes(t)) {
            card.classList.remove('hidden-card');
            card.classList.add('highlight');
            count++;
          } else {
            card.classList.add('hidden-card');
            card.classList.remove('highlight');
          }
        });
        if (t === '') {
          searchHint.textContent = `🔍 Menampilkan ${currentIndex.toLocaleString('id-ID')} dari ${TOTAL_CARDS.toLocaleString('id-ID')} video`;
        } else {
          searchHint.textContent = `🔍 Ditemukan ${count.toLocaleString('id-ID')} video untuk "${term}"`;
        }
        let nr = document.querySelector('.no-result');
        if (count === 0 && t !== '') {
          if (!nr) {
            nr = document.createElement('div');
            nr.className = 'no-result';
            nr.textContent = '✨ Tidak ada video yang cocok.';
            videoGrid.appendChild(nr);
          }
        } else {
          if (nr) nr.remove();
        }
      }

      searchInput.addEventListener('input', function() {
        const val = this.value;
        filterCards(val);
        searchClear.style.display = val.trim() ? 'flex' : 'none';
      });

      searchClear.addEventListener('click', function() {
        searchInput.value = '';
        filterCards('');
        searchClear.style.display = 'none';
        searchInput.focus();
      });

      function renderBatch() {
        const fragment = document.createDocumentFragment();
        const end = Math.min(currentIndex + BATCH_SIZE, TOTAL_CARDS);
        for (let i = currentIndex; i < end; i++) {
          const card = createCard(i);
          fragment.appendChild(card);
          renderedCards.push(card);
        }
        videoGrid.appendChild(fragment);
        currentIndex = end;
        if (searchInput.value.trim() === '') {
          searchHint.textContent = `🔍 Menampilkan ${currentIndex.toLocaleString('id-ID')} dari ${TOTAL_CARDS.toLocaleString('id-ID')} video`;
        }
        if (currentIndex >= TOTAL_CARDS) {
          loader.style.display = 'none';
          if (searchInput.value.trim() === '') {
            searchHint.textContent = `✨ 1.000.000 koleksi premium NDI Video siap dicari`;
          }
        }
        if (searchInput.value.trim() !== '') filterCards(searchInput.value.trim());
      }

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting && currentIndex < TOTAL_CARDS) renderBatch();
        });
      }, { rootMargin: '250px', threshold: 0.1 });

      if (loader) observer.observe(loader);
      renderBatch();

      let checkInterval = setInterval(() => {
        if (currentIndex >= TOTAL_CARDS) { clearInterval(checkInterval); loader.style.display = 'none'; return; }
        const rect = loader.getBoundingClientRect();
        if (rect.top < window.innerHeight + 400 && currentIndex < TOTAL_CARDS) renderBatch();
      }, 350);

    })();
  </script>
